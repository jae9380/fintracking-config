server:
  port: 8888

spring:
  application:
    name: fintracking-config
  profiles:
    active: native,secret
  cloud:
    config:
      server:
        native:
          search-locations: file://${user.home}/Desktop/git/msa-fintracking/fintracking-config-repo
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: busrefresh, health, info

